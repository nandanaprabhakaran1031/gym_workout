<!DOCTYPE html>
<html>
<head>
    <title>Gym Workout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#111827;
        }

        .hero{
            background:linear-gradient(135deg,#111827,#1f2937);
            color:white;
            padding:80px 20px;
            border-radius:15px;
            margin-top:20px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .footer{
            background:#111827;
            color:white;
            padding:20px;
            margin-top:50px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏋 Gym Workout</a>

        <div>
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/workouts/" class="btn btn-outline-light me-2">Workouts</a>
            <a href="/memberships/" class="btn btn-outline-light me-2">Memberships</a>
            <a href="/progress/" class="btn btn-outline-light me-2">Progress</a>
            <a href="/contact/" class="btn btn-outline-light">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<div class="footer text-center">
    <h5>Gym Workout Website</h5>
    <p>Transform Your Body, Transform Your Life</p>
</div>

</body>
</html>
