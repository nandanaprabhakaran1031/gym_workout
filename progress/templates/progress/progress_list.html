<!DOCTYPE html>
<html>
<head>
    <title>Progress Tracker</title>
</head>
<body>

    <h1>Progress Tracker</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Date:</label>
        <input type="date" name="date" required>
        <br><br>

        <label>Weight (kg):</label>
        <input type="number" step="0.1" name="weight" required>
        <br><br>

        <label>Height (cm):</label>
        <input type="number" step="0.1" name="height" required>
        <br><br>

        <label>Body Fat (%):</label>
        <input type="number" step="0.1" name="body_fat">
        <br><br>

        <button type="submit">Save Progress</button>

    </form>

    <hr>

    <h2>Your Progress Records</h2>

    <table border="1" cellpadding="10">

        <tr>
            <th>Date</th>
            <th>Weight (kg)</th>
            <th>Height (cm)</th>
            <th>BMI</th>
            <th>Body Fat (%)</th>
        </tr>

        {% for record in records %}
        <tr>
            <td>{{ record.date }}</td>
            <td>{{ record.weight }}</td>
            <td>{{ record.height }}</td>
            <td>{{ record.bmi|floatformat:2 }}</td>
            <td>{{ record.body_fat }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
