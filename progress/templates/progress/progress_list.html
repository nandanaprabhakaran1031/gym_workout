{% extends 'gymapp/base.html' %}

{% block content %}

<div class="card p-4 mb-4">

<h2 class="text-center mb-4">
📈 Progress Tracker
</h2>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-4">
<input type="date"
       name="date"
       class="form-control"
       required>
</div>

<div class="col-md-4">
<input type="number"
       step="0.1"
       name="weight"
       class="form-control"
       placeholder="Weight (kg)"
       required>
</div>

<div class="col-md-4">
<input type="number"
       step="0.1"
       name="height"
       class="form-control"
       placeholder="Height (cm)"
       required>
</div>

</div>

<button class="btn btn-primary mt-3">
Save Progress
</button>

</form>

</div>

<div class="card p-4">

<h3 class="mb-4">
Your Progress Records
</h3>

<table class="table table-striped table-hover">

<thead>

<tr>
<th>Date</th>
<th>Weight</th>
<th>Height</th>
<th>BMI</th>
</tr>

</thead>

<tbody>

{% for record in records %}

<tr>
<td>{{ record.date }}</td>
<td>{{ record.weight }}</td>
<td>{{ record.height }}</td>
<td>{{ record.bmi|floatformat:2 }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
