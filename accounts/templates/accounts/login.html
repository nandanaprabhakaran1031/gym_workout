{% extends 'gymapp/base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4">

<h2 class="text-center mb-4">
Login
</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text"
           class="form-control mb-3"
           placeholder="Username">

    <input type="password"
           class="form-control mb-3"
           placeholder="Password">

    <button class="btn btn-primary w-100">
        Login
    </button>

</form>

</div>

</div>

</div>

{% endblock %}
